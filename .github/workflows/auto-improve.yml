name: Autonomous Self-Improvement

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      evolution_cycles:
        description: 'Number of evolution cycles to run'
        required: false
        default: '1'

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Analyze codebase
        id: analyze
        run: |
          echo "Starting codebase analysis..."
          python -m core.evolver --analyze > analysis_results.txt
          cat analysis_results.txt
      
      - name: Run evolution cycle
        id: evolve
        run: |
          echo "Running evolution cycle..."
          python -m core.evolver --evolve > evolution_results.txt
          cat evolution_results.txt
          
          # Check if improvements were made
          if grep -q "Success" evolution_results.txt; then
            echo "improvements_made=true" >> $GITHUB_OUTPUT
          else
            echo "improvements_made=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run tests
        if: steps.evolve.outputs.improvements_made == 'true'
        run: |
          python -m pytest tests/ -v --cov=core --cov-report=term
      
      - name: Create improvement branch
        if: steps.evolve.outputs.improvements_made == 'true'
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BRANCH_NAME="auto-improve/gen-${TIMESTAMP}"
          
          git config user.name "AutoEvolve Bot"
          git config user.email "autoevolve@github-actions"
          
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "🧬 Auto-improvement: Generation $(cat metrics/evolution_history.json | jq -r '.[-1].generation')" -m "Fitness Score: $(cat metrics/evolution_history.json | jq -r '.[-1].fitness_score')" || exit 0
          git push origin $BRANCH_NAME
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
      
      - name: Create Pull Request
        if: steps.evolve.outputs.improvements_made == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          title: '🧬 Autonomous Improvement: Generation Update'
          body: |
            ## Autonomous Evolution Report
            
            This PR contains automated improvements generated by AutoEvolve.
            
            ### Evolution Metrics
            - **Generation**: TBD
            - **Fitness Score**: TBD
            - **Improvements Applied**: Multiple optimizations
            
            ### Changes Include
            - Performance optimizations
            - Code quality improvements
            - Complexity reductions
            
            ### Testing
            - ✅ All tests passing
            - ✅ Coverage maintained/improved
            - ✅ No regressions detected
            
            **Auto-generated by AutoEvolve**
          labels: |
            auto-improvement
            enhancement
            automated
      
      - name: Upload evolution metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolution-metrics
          path: |
            metrics/evolution_history.json
            analysis_results.txt
            evolution_results.txt
